<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Комплекс упражнений</title>

  <style>
    :root {
      --orange: #FF4500;
      --orange-dark: #E33D00;
      --bg: #FAF7F2;
      --card: #FFFFFF;
      --text: #1F1F1F;
      --muted: #6B625C;
      --line: #EFE3DA;
      --soft: #FFF1E8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 247, 242, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 22px;
    }

    .sun {
      color: var(--orange);
      font-size: 30px;
    }

    .stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      white-space: nowrap;
    }

    .counter,
    .timer {
      font-size: 16px;
      font-weight: 700;
    }

    .counter span,
    .timer span {
      color: var(--orange);
    }

    .progress {
      margin-top: 12px;
      height: 8px;
      background: #eadfd7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--orange);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
      padding: 5px;
      background: #F0E6DD;
      border-radius: 16px;
    }

    .tab-btn {
      border: none;
      border-radius: 12px;
      padding: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--orange);
      color: #fff;
    }

    .hero,
    .day-note {
      margin: 18px;
      padding: 26px 24px;
      min-height: 330px;
      border-radius: 24px;
      border: 1px solid var(--line);
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }

    .hero {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.78) 50%, rgba(255,255,255,0.08) 100%),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80");
    }

    .evening-hero {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.82) 55%, rgba(255,255,255,0.12) 100%),
        url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80");
    }

    .day-note {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.97) 0%, rgba(255,255,255,0.83) 55%, rgba(255,255,255,0.12) 100%),
        url("https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=1200&q=80");
    }

    .hero h1,
    .day-note h2 {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.05;
      color: var(--orange);
    }

    .hero h2 {
      margin: 0 0 18px;
      font-size: 24px;
      line-height: 1.2;
    }

    .hero p,
    .day-note p {
      max-width: 370px;
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.45;
    }

    .day-note ul {
      max-width: 390px;
      margin: 14px 0;
      padding-left: 20px;
      font-size: 17px;
      line-height: 1.45;
    }

    .massage-card {
      margin: 12px 18px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(80, 40, 20, 0.05);
    }

    .massage-card h2 {
      margin: 0 0 12px;
      font-size: 30px;
      color: var(--orange);
    }

    .massage-card p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 17px;
    }

    .start-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      background: var(--orange);
      color: white;
      font-size: 18px;
      font-weight: 800;
      padding: 16px;
      cursor: pointer;
    }

    .start-btn.started {
      background: #1F9D55;
    }

    .section-title {
      margin: 28px 18px 12px;
      font-size: 24px;
      font-weight: 800;
    }

    .card {
      margin: 12px 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(80, 40, 20, 0.05);
    }

    .exercise,
    .video-card {
      display: grid;
      grid-template-columns: 44% 56%;
      min-height: 210px;
    }

    .exercise-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      object-position: center;
      display: block;
      background: #eee;
    }

    .exercise-content,
    .video-content {
      min-height: 210px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .exercise-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .num {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--orange);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
    }

    .exercise-title {
      margin: 2px 0 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 800;
    }

    .count {
      margin: 0 0 4px 46px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.3;
    }

    .done-btn {
      margin-left: 46px;
      border: none;
      border-radius: 14px;
      background: var(--orange);
      color: white;
      font-size: 17px;
      font-weight: 800;
      padding: 14px 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .done-btn.done {
      background: #1F9D55;
    }

    .video-preview {
      min-height: 210px;
      background: var(--soft);
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: stretch;
      font-size: 54px;
      color: var(--orange);
    }

    .video-content h3 {
      margin: 0;
      font-size: 22px;
    }

    .video-content p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .video-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .video-link {
      display: block;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
      padding: 13px 14px;
    }

    .practice-card {
      padding: 24px;
    }

    .practice-card + .practice-card {
      margin-top: 0;
    }

    .practice-card-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .practice-copy {
      flex: 1 1 auto;
      min-width: 0;
    }

    .practice-card h3 {
      margin: 2px 0 8px;
      font-size: 24px;
      line-height: 1.15;
    }

    .practice-card p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
    }

    .practice-cue {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--soft);
      color: var(--text);
      font-weight: 700;
      line-height: 1.35;
    }

    .practice-card .done-btn {
      width: 100%;
      margin: 16px 0 0;
    }

    .finish {
      margin: 20px 18px 18px;
      padding: 24px;
      border-radius: 24px;
      background: var(--soft);
      border: 1px solid var(--line);
      text-align: center;
    }

    .finish h2 {
      margin: 0 0 8px;
      color: var(--orange);
      font-size: 28px;
    }

    .finish p {
      margin: 0;
      font-size: 17px;
      color: var(--muted);
      line-height: 1.4;
    }

    .reset-btn {
      width: calc(100% - 36px);
      margin: 12px 18px 0;
      border: 1px solid var(--orange);
      background: transparent;
      color: var(--orange);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 520px) {
      .brand { font-size: 18px; }

      .counter,
      .timer { font-size: 14px; }

      .tab-btn {
        padding: 10px 8px;
        font-size: 14px;
      }

      .hero,
      .day-note {
        min-height: 310px;
        padding: 22px 20px;
      }

      .hero h1,
      .day-note h2 { font-size: 34px; }

      .exercise,
      .video-card { grid-template-columns: 1fr; }

      .exercise-img { height: 260px; }

      .video-preview { min-height: 260px; }

      .exercise-content,
      .video-content { min-height: auto; }
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <div class="sun" id="routineIcon">☀</div>
          <div id="routineTitle">Утренний комплекс</div>
        </div>

        <div class="stats">
          <div class="counter"><span id="doneCount">0</span> из <span id="totalCount">0</span></div>
          <div class="timer">Время: <span id="timerValue">00:00</span></div>
        </div>
      </div>

      <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="morning">☀ Утро</button>
        <button class="tab-btn" data-tab="evening">🌙 Вечер</button>
        <button class="tab-btn" data-tab="advaita">◌ Адвайта</button>
      </div>
    </header>

    <main id="contentRoot"></main>

    <button class="reset-btn" id="resetBtn">Сбросить отметки</button>
  </div>

              {
                title: "Шаг 1. Стоять. Всё. Я вижу.",
                text: "Как только внутри начинается ментальный диалог, обида, ярость, зависть, ревность или жалость к себе, осознай: это говоришь не ты, это включилась автоматическая программа ума, которая хочет высосать твою энергию.",
                cue: "Сразу останови поток: «Стоять. Всё. Я вижу.»"
              },
              {
                title: "Шаг 2. Поиск следа в теле",
                text: "Останови поток слов в голове и молча направь всё внимание на физические параметры возникшего в теле зажима: тяжесть, ком, жар. Не анализируй его умом.",
                cue: "Внимание не в историю, а в ощущение."
              },
              {
                title: "Шаг 3. «Выдувание» информации и сдача",
                text: "Тотально разреши зажиму быть и на выдохе мысленно «выдувай» эту вибрацию наружу сквозь пористое тело, возвращая высвобожденную энергию обратно в систему.",
                cue: "Не борись. Выдыхай и освобождай."
              },
              {
                title: "Шаг 4. Возврат к Источнику",
                text: "В наступившее мгновение тишины сразу разверни внимание на самого Наблюдателя вопросом: «А КТО сейчас чувствует это облегчение?», упираясь в безмолвное Присутствие.",
                cue: "Не забирай это в эго. Вернись к Источнику."
              }
            ]
          }
        ],
        finish: {
          title: "Главная опора",
          text: "Поспешай потихоньку. Смысл не в идеальном дне, а в сотнях спокойных возвращений внимания назад."
        },
        dayNote: false
      }
    };

    let currentTab = localStorage.getItem("active-routine-tab") || "morning";
    let timerInterval = null;

    const contentRoot = document.getElementById("contentRoot");
    const doneCount = document.getElementById("doneCount");
    const totalCount = document.getElementById("totalCount");
    const progressFill = document.getElementById("progressFill");
    const resetBtn = document.getElementById("resetBtn");
    const timerValue = document.getElementById("timerValue");
    const routineTitle = document.getElementById("routineTitle");
    const routineIcon = document.getElementById("routineIcon");
    const tabButtons = document.querySelectorAll(".tab-btn");

    function getRoutine() {
      return routines[currentTab];
    }

    function key(name) {
      return `${getRoutine().storagePrefix}-${name}`;
    }

    function getDoneState() {
      return JSON.parse(localStorage.getItem(key("done"))) || {};
    }

    function saveDoneState(state) {
      localStorage.setItem(key("done"), JSON.stringify(state));
    }

    function getTimerStart() {
      return Number(localStorage.getItem(key("timer-start"))) || null;
    }

    function getTimerStop() {
      return Number(localStorage.getItem(key("timer-stop"))) || null;
    }

    function getTotalItems() {
      const routine = getRoutine();
      const exercisesTotal = (routine.exercises || []).length;
      const videosTotal = (routine.videos || []).length;
      const checklistTotal = (routine.checklistSections || []).reduce((total, section) => {
        return total + (section.items || []).length;
      }, 0);

      return exercisesTotal + videosTotal + checklistTotal;
    }

    function getCompletedCount() {
      return Object.values(getDoneState()).filter(Boolean).length;
    }

    function formatTime(milliseconds) {
      const totalSeconds = Math.max(0, Math.floor(milliseconds / 1000));
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function updateTimer() {
      const start = getTimerStart();
      const stop = getTimerStop();

      if (!start) {
        timerValue.textContent = "00:00";
        return;
      }

      const endTime = stop || Date.now();
      timerValue.textContent = formatTime(endTime - start);
    }

    function startTimerIfNeeded() {
      if (!getTimerStart()) {
        localStorage.setItem(key("timer-start"), String(Date.now()));
      }

      if (timerInterval) {
        clearInterval(timerInterval);
      }

      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
      updateStartButton();
    }

    function stopTimerIfNeeded() {
      if (getCompletedCount() === getTotalItems() && getTimerStart() && !getTimerStop()) {
        localStorage.setItem(key("timer-stop"), String(Date.now()));
      }

      updateTimer();
    }

    function updateProgress() {
      const completed = getCompletedCount();
      const total = getTotalItems();

      doneCount.textContent = completed;
      totalCount.textContent = total;
      progressFill.style.width = total > 0 ? `${(completed / total) * 100}%` : "0%";

      if (completed === total && total > 0) {
        stopTimerIfNeeded();
      }
    }

    function updateStartButton() {
      const btn = document.getElementById("startRoutineBtn");
      if (!btn) return;

      const routine = getRoutine();

      if (getTimerStart()) {
        btn.textContent = "✓ Комплекс начат";
        btn.classList.add("started");
        btn.disabled = true;
      } else {
        btn.textContent = routine.startCard.button;
        btn.classList.remove("started");
        btn.disabled = false;
      }
    }

    function toggleDone(id, button) {
      const state = getDoneState();

      state[id] = !state[id];
      saveDoneState(state);

      button.classList.toggle("done", state[id]);
      button.textContent = state[id] ? "✓ Выполнено" : "✓ Я выполнил";

      if (getCompletedCount() > 0 && !getTimerStop()) {
        startTimerIfNeeded();
      }

      if (getCompletedCount() < getTotalItems()) {
        localStorage.removeItem(key("timer-stop"));
      }

      updateProgress();
      updateTimer();
    }

    function renderHero(routine) {
      const hasSubtitle = Boolean(routine.hero.subtitle);
      const hasParagraphs = (routine.hero.paragraphs || []).length > 0;

      if (!hasSubtitle && !hasParagraphs) return "";

      return `
        <section class="${routine.heroClass}">
          <h1>${routine.hero.title}</h1>
          ${hasSubtitle ? `<h2>${routine.hero.subtitle}</h2>` : ""}
          ${(routine.hero.paragraphs || []).map(text => `<p>${text}</p>`).join("")}
        </section>
      `;
    }

    function renderStartCard(routine) {
      if (!routine.startCard) return "";

      return `
        <section class="massage-card">
          <h2>${routine.startCard.title}</h2>
          <p>${routine.startCard.text}</p>
          <button id="startRoutineBtn" class="start-btn">${routine.startCard.button}</button>
        </section>
      `;
    }

    function renderExercises(routine) {
      if (!routine.exercises || !routine.exercises.length) return "";

      const state = getDoneState();

      return routine.exercises.map((item, index) => {
        const id = `exercise-${index + 1}`;

        return `
          <section class="card exercise">
            <img class="exercise-img" src="${item.image}" alt="${item.title}">
            <div class="exercise-content">
              <div class="exercise-head">
                <div class="num">${index + 1}</div>
                <h2 class="exercise-title">${item.title}</h2>
              </div>
              <p class="count">${item.count}</p>
              <button class="done-btn ${state[id] ? "done" : ""}" data-id="${id}">
                ${state[id] ? "✓ Выполнено" : "✓ Я выполнил"}
              </button>
            </div>
          </section>
        `;
      }).join("");
    }

    function renderVideos(routine) {
      const state = getDoneState();

      if (!routine.videos || !routine.videos.length) return "";

      return `
        <h2 class="section-title">Видео</h2>
        ${routine.videos.map((item, index) => {
          const id = `video-${index + 1}`;

          return `
            <section class="card video-card">
              <div class="video-preview">▶</div>
              <div class="video-content">
                <h3>${item.title}</h3>
                <p>${item.count}</p>
                <div class="video-actions">
                  <a class="video-link" href="${item.url}" target="_blank" rel="noopener">Открыть видео</a>
                  <button class="done-btn ${state[id] ? "done" : ""}" data-id="${id}">
                    ${state[id] ? "✓ Выполнено" : "✓ Я выполнил"}
                  </button>
                </div>
              </div>
            </section>
          `;
        }).join("")}
      `;
    }

    function renderChecklistSections(routine) {
      const sections = routine.checklistSections || [];
      const state = getDoneState();

      if (!sections.length) return "";

      return sections.map((section, sectionIndex) => `
        <h2 class="section-title">${section.title}</h2>
        ${(section.items || []).map((item, itemIndex) => {
          const id = `check-${sectionIndex + 1}-${itemIndex + 1}`;

          return `
            <section class="card practice-card">
              <div class="practice-card-head">
                <div class="practice-copy">
                  <h3>${item.title}</h3>
                  <p>${item.text}</p>
                  <div class="practice-cue">${item.cue}</div>
                  <button class="done-btn ${state[id] ? "done" : ""}" data-id="${id}">
                    ${state[id] ? "✓ Выполнено" : "✓ Я сделал"}
                  </button>
                </div>
              </div>
            </section>
          `;
        }).join("")}
      `).join("");
    }

    function renderFinish(routine) {
      return `
        <section class="finish">
          <h2>${routine.finish.title}</h2>
          <p>${routine.finish.text}</p>
        </section>
      `;
    }

    function renderDayNote(routine) {
      if (!routine.dayNote) return "";

      return `
        <section class="day-note">
          <h2>На день</h2>
          <p>В течение дня, когда появляется мысль, возвращайтесь к наблюдению.</p>
          <ul>
            <li>Кто это наблюдает?</li>
            <li>Кто это сейчас комментирует?</li>
            <li>Кто это фантазирует?</li>
          </ul>
          <p>И мягко направляйте внимание в тело.</p>
        </section>
      `;
    }

    function renderPage() {
      const routine = getRoutine();

      routineTitle.textContent = routine.title;
      routineIcon.textContent = routine.icon;

      tabButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === currentTab);
      });

      contentRoot.innerHTML = `
        ${renderHero(routine)}
        ${renderStartCard(routine)}
        ${renderExercises(routine)}
        ${renderVideos(routine)}
        ${renderChecklistSections(routine)}
        ${renderFinish(routine)}
        ${renderDayNote(routine)}
      `;

      updateProgress();
      updateTimer();
      updateStartButton();

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      if (getTimerStart() && !getTimerStop()) {
        timerInterval = setInterval(updateTimer, 1000);
      }
    }

    document.addEventListener("click", (event) => {
      if (event.target.classList.contains("done-btn")) {
        toggleDone(event.target.dataset.id, event.target);
      }

      if (event.target.id === "startRoutineBtn") {
        startTimerIfNeeded();
      }

      if (event.target.classList.contains("tab-btn")) {
        currentTab = event.target.dataset.tab;
        localStorage.setItem("active-routine-tab", currentTab);
        renderPage();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    resetBtn.addEventListener("click", () => {
      saveDoneState({});
      localStorage.removeItem(key("timer-start"));
      localStorage.removeItem(key("timer-stop"));

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      renderPage();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    renderPage();
  </script>
</body>
</html>

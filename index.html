<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Утренний комплекс</title>

  <style>
    :root {
      --orange: #FF4500;
      --orange-dark: #E33D00;
      --bg: #FAF7F2;
      --card: #FFFFFF;
      --text: #1F1F1F;
      --muted: #6B625C;
      --line: #EFE3DA;
      --soft: #FFF1E8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 247, 242, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 22px;
    }

    .sun {
      color: var(--orange);
      font-size: 30px;
      line-height: 1;
    }

    .counter {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .counter span {
      color: var(--orange);
    }

    .progress {
      margin-top: 12px;
      height: 8px;
      background: #eadfd7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--orange);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .hero {
      margin: 18px;
      padding: 26px 24px;
      min-height: 330px;
      border-radius: 24px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.78) 48%, rgba(255,255,255,0.08) 100%),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.05;
      color: var(--orange);
    }

    .hero h2 {
      margin: 0 0 18px;
      font-size: 24px;
      line-height: 1.2;
    }

    .hero p {
      max-width: 330px;
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.45;
    }

    .section-title {
      margin: 28px 18px 12px;
      font-size: 24px;
      font-weight: 800;
    }

    .card {
      margin: 12px 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(80, 40, 20, 0.05);
    }

    .exercise {
      display: grid;
      grid-template-columns: 44% 56%;
      min-height: 190px;
    }

    .exercise-img {
      width: 100%;
      height: 100%;
      min-height: 190px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .exercise-content {
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .exercise-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .num {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--orange);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
    }

    .exercise-title {
      margin: 2px 0 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 800;
    }

    .count {
      margin: 0 0 4px 46px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.3;
    }

    .done-btn {
      margin-left: 46px;
      border: none;
      border-radius: 14px;
      background: var(--orange);
      color: white;
      font-size: 17px;
      font-weight: 800;
      padding: 14px 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .done-btn:hover {
      background: var(--orange-dark);
    }

    .done-btn.done {
      background: #1F9D55;
    }

    .video-card {
      display: grid;
      grid-template-columns: 44% 56%;
      min-height: 170px;
    }

    .video-preview {
      background: var(--soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      color: var(--orange);
      min-height: 170px;
    }

    .video-content {
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .video-content h3 {
      margin: 0;
      font-size: 22px;
    }

    .video-content p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .video-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .video-link {
      display: block;
      text-align: center;
      text-decoration: none;
      border-radius: 14px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
      padding: 13px 14px;
    }

    .finish {
      margin: 20px 18px 40px;
      padding: 24px;
      border-radius: 24px;
      background: var(--soft);
      border: 1px solid var(--line);
      text-align: center;
    }

    .finish h2 {
      margin: 0 0 8px;
      color: var(--orange);
      font-size: 28px;
    }

    .finish p {
      margin: 0;
      font-size: 17px;
      color: var(--muted);
      line-height: 1.4;
    }

    .reset-btn {
      width: calc(100% - 36px);
      margin: 12px 18px 0;
      border: 1px solid var(--orange);
      background: transparent;
      color: var(--orange);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 520px) {
      .brand {
        font-size: 20px;
      }

      .hero {
        min-height: 310px;
        padding: 22px 20px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .exercise,
      .video-card {
        grid-template-columns: 1fr;
      }

      .exercise-img {
        min-height: 250px;
      }

      .count,
      .done-btn {
        margin-left: 46px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <div class="sun">☀</div>
          <div>Утренний комплекс</div>
        </div>
        <div class="counter"><span id="doneCount">0</span> из <span id="totalCount">0</span></div>
      </div>
      <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </header>

    <section class="hero">
      <h1>Доброе утро!</h1>
      <h2>Спокойно. Без спешки.</h2>
      <p>Сначала соберите себя в теле.</p>
      <p>Ощущение, что нужно торопиться — это привычка нервной системы.</p>
      <p>Вернитесь в тело. С этого начинается ваш день.</p>
    </section>

    <main id="exerciseList"></main>

    <h2 class="section-title">Видео</h2>
    <main id="videoList"></main>

    <section class="finish">
      <h2>Комплекс завершён</h2>
      <p>Сегодня вы уже сделали что-то хорошее для себя.</p>
    </section>

    <button class="reset-btn" id="resetBtn">Сбросить отметки</button>
  </div>

  <script>
    const exercises = [
      {
        title: "Наклоны в бабочке",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599447421416-3414500d18a5?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Бабочка",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599447421416-3414500d18a5?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Жим таза в бабочке",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Обратная планка",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Скрутка",
        count: "5 раз на каждую сторону",
        image: "https://images.unsplash.com/photo-1593811167562-9cef47bfc4d7?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Наездник",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1602192509154-0b900ee1f851?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Приседание простата",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Отжимания",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1598971639058-ae5f1a965b42?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Наездник",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1602192509154-0b900ee1f851?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Поза голубя",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1593811167562-9cef47bfc4d7?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини поясница 1",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1545389336-cf090694435e?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини поясница 2",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1545389336-cf090694435e?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини грудь 1",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини грудь 2",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини грудь 3",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини грудь 4",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини грудь 5",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Кундалини плечи 1",
        count: "50 раз",
        image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&w=900&q=80"
      },
      {
        title: "Подтягивания",
        count: "10 раз",
        image: "https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=900&q=80"
      }
    ];

    const videos = [
      {
        title: "Самомассаж шеи",
        count: "Видео",
        url: "https://youtu.be/30mrdoaUbGQ"
      },
      {
        title: "Самомассаж лица",
        count: "Видео",
        url: "https://youtu.be/A4THQfX4ZHc"
      }
    ];

    const STORAGE_KEY = "morning-routine-done";

    const exerciseList = document.getElementById("exerciseList");
    const videoList = document.getElementById("videoList");
    const doneCount = document.getElementById("doneCount");
    const totalCount = document.getElementById("totalCount");
    const progressFill = document.getElementById("progressFill");
    const resetBtn = document.getElementById("resetBtn");

    const totalItems = exercises.length + videos.length;

    let doneState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(doneState));
    }

    function updateProgress() {
      const completed = Object.values(doneState).filter(Boolean).length;
      doneCount.textContent = completed;
      totalCount.textContent = totalItems;
      progressFill.style.width = `${(completed / totalItems) * 100}%`;
    }

    function toggleDone(id, button) {
      doneState[id] = !doneState[id];
      saveState();

      button.classList.toggle("done", doneState[id]);
      button.textContent = doneState[id] ? "✓ Выполнено" : "✓ Я выполнил";

      updateProgress();
    }

    function renderExercises() {
      exerciseList.innerHTML = "";

      exercises.forEach((item, index) => {
        const id = `exercise-${index + 1}`;

        const card = document.createElement("section");
        card.className = "card exercise";

        card.innerHTML = `
          <img class="exercise-img" src="${item.image}" alt="${item.title}">
          <div class="exercise-content">
            <div class="exercise-head">
              <div class="num">${index + 1}</div>
              <h2 class="exercise-title">${item.title}</h2>
            </div>
            <p class="count">${item.count}</p>
            <button class="done-btn ${doneState[id] ? "done" : ""}" data-id="${id}">
              ${doneState[id] ? "✓ Выполнено" : "✓ Я выполнил"}
            </button>
          </div>
        `;

        exerciseList.appendChild(card);
      });
    }

    function renderVideos() {
      videoList.innerHTML = "";

      videos.forEach((item, index) => {
        const id = `video-${index + 1}`;

        const card = document.createElement("section");
        card.className = "card video-card";

        card.innerHTML = `
          <div class="video-preview">▶</div>
          <div class="video-content">
            <h3>${item.title}</h3>
            <p>${item.count}</p>
            <div class="video-actions">
              <a class="video-link" href="${item.url}" target="_blank" rel="noopener">Открыть видео</a>
              <button class="done-btn ${doneState[id] ? "done" : ""}" data-id="${id}">
                ${doneState[id] ? "✓ Выполнено" : "✓ Я выполнил"}
              </button>
            </div>
          </div>
        `;

        videoList.appendChild(card);
      });
    }

    document.addEventListener("click", (event) => {
      if (event.target.classList.contains("done-btn")) {
        const id = event.target.dataset.id;
        toggleDone(id, event.target);
      }
    });

    resetBtn.addEventListener("click", () => {
      doneState = {};
      saveState();
      renderExercises();
      renderVideos();
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    renderExercises();
    renderVideos();
    updateProgress();
  </script>
</body>
</html>
